#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Muhammad Talal Anwar"
email = "noreply@talal.ch"

[signing]
key = "~/.ssh/git_sign_talal"
behavior = "drop"
backend = "ssh"

[git]
sign-on-push = true

[fsmonitor]
backend = "watchman"
watchman.register-snapshot-trigger = true

[ui]
default-command = "status"
diff-editor = ":builtin"
revsets-use-glob-by-default = true
# Reference: https://dandavison.github.io/delta/configuration.html#jujutsu
pager = "delta"
diff-formatter = ":git"

# Reference: https://docs.jj-vcs.dev/latest/config/#generating-diffs-by-external-command
[merge-tools.difft]
diff-args = ["--color=always", "$left", "$right"]

[templates]
# Customize the bookmark name when running `jj git push --change`.
git_push_bookmark = "'talal/' ++ change_id.short()"

[aliases]
# Move the closest bookmark to the current commit. This is useful when
# working on a named branch, creating a bunch of commits, and then needing
# to update the bookmark before pushing.
tug = ["bookmark", "advance", "--to", "@-"]

# Rebase the current branch onto the trunk.
retrunk = ["rebase", "--onto", "trunk()"]

[revset-aliases]
"fork_history(to, from)" = "fork_point(to | from)..@"

[template-aliases]
"format_timestamp(timestamp)" = "timestamp.ago()" # use relative timestamps
