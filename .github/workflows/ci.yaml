name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 #v17
        with:
          name: talal
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check formatting
        run: |
          system=$(nix eval --raw --impure --expr builtins.currentSystem)
          nix build -L .#checks."${system}".formatting
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          # Inject the token so Nix can fetch private flake inputs
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GH_TOKEN_FOR_NIX }}
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 #v17
        with:
          name: talal
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build
        run: nix build -L .#nixosConfigurations.thinkpad.config.system.build.toplevel
