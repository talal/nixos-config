name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          # Inject the token so Nix can fetch private flake inputs
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GH_TOKEN_FOR_NIX }}
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 #v17
        with:
          name: talal
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check formatting
        run: |
          system=$(nix eval --raw --impure --expr builtins.currentSystem)
          nix build -L .#checks."${system}".formatting
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          # Inject the token so Nix can fetch private flake inputs
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GH_TOKEN_FOR_NIX }}
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 #v17
        with:
          name: talal
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build
        # run: nix run 'github:Mic92/nix-fast-build' -- --no-nom --skip-cached --retries=3 --flake '.#nixosConfigurations.thinkpad.config.system.build.toplevel'
        run: nix build -L .#nixosConfigurations.thinkpad.config.system.build.toplevel
